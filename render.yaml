services:
  - type: web
    name: tutorlink
    runtime: python
    buildCommand: ./build.sh
    startCommand: python -m gunicorn tutorLink.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: WEB_CONCURRENCY
        value: 4
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
