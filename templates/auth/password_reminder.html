{% extends 'base.html' %}
{% load static %}

{% block title %}Reset password — TutorLink{% endblock %}

{% block content %}
<div class="auth-shell">
  <div class="auth-card rise rise-1">
    <h1>Reset password.</h1>
    <p class="lede">Enter your email and we'll send a reset link.</p>

    <form method="post" action="{% url 'password_reminder' %}" novalidate>
      {% csrf_token %}

      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" class="input" required autocomplete="email" autofocus>
        <p class="help">We'll only use this to send your reset link.</p>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg">Send reset link</button>
    </form>

    <div class="auth-foot">
      Remembered it? <a href="{% url 'login' %}">Back to sign in</a>
    </div>
  </div>
</div>
{% endblock %}
